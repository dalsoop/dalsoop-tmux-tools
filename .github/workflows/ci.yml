name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --release

      - name: Unit tests
        run: cargo test

      - name: Clippy
        run: cargo clippy -- -D warnings

  smoke-test:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # NOTE: This duplicates the `cargo build --release` from build-and-test.
      # The shared cargo cache key means incremental compilation avoids a full
      # rebuild in practice, but a cleaner approach would be to upload the
      # compiled binaries as artifacts in build-and-test and download them here.
      - name: Build
        run: cargo build --release

      - name: Install binaries
        run: |
          sudo cp target/release/tmux-sessionbar /usr/local/bin/
          sudo cp target/release/tmux-windowbar /usr/local/bin/

      - name: Install tmux and bats
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux ripgrep
          sudo ./tests/install-bats.sh /usr/local

      - name: Smoke tests
        run: bats tests/smoke.bats
