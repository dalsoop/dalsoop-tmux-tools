name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Package
        run: |
          mkdir -p dist
          cp target/release/tmux-sessionbar dist/
          cp target/release/tmux-windowbar dist/
          cp target/release/tmux-config dist/
          cp install.sh dist/
          cd dist
          tar czf tmux-tools-x86_64-linux.tar.gz tmux-sessionbar tmux-windowbar tmux-config install.sh
          sha256sum tmux-tools-x86_64-linux.tar.gz > SHA256SUMS

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --generate-notes \
            dist/tmux-tools-x86_64-linux.tar.gz \
            dist/SHA256SUMS
