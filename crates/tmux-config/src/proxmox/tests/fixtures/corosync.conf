logging {
  debug: off
  to_syslog: yes
}

nodelist {
  node {
    name: pve
    nodeid: 1
    quorum_votes: 1
    ring0_addr: 192.168.2.50
  }
  node {
    name: ranode-3960x
    nodeid: 2
    quorum_votes: 1
    ring0_addr: 192.168.2.60
  }
}

quorum {
  provider: corosync_votequorum
}

totem {
  cluster_name: dalcluster
  config_version: 4
  interface {
    linknumber: 0
  }
  ip_version: ipv4-6
  link_mode: passive
  secauth: on
  version: 2
}

